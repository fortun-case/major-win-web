<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Major Win — Case Simulator</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="header">
        <h1>MAJOR <span class="gold">WIN</span></h1>
        <div id="auth-section">
            <button id="login-btn">Войти через Google</button>
            <div id="user-info" style="display:none;">
                <span id="user-email"></span> | 
                <span class="gold">Баланс: <span id="balance-amount">0</span>$</span>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="case-card">
            <div class="item-visual">
                <div id="rarity-glow"></div>
                <img src="https://via.placeholder.com/200x150/111/ffca2d?text=Major+Win" id="item-img">
            </div>
            <h2 id="item-name">Удачи, боец!</h2>
            <p id="item-rarity-text">Нажми "Открыть", чтобы начать</p>
            <button id="open-btn" class="btn-main">ОТКРЫТЬ КЕЙС (50$)</button>
        </div>

        <div class="inventory-section">
            <h3>ВАШ ИНВЕНТАРЬ</h3>
            <div id="inventory-list" class="inventory-grid">
                </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
