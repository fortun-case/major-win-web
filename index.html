<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Major Win | Case Battle</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        body { background-color: #0d1117; color: #e6edf3; font-family: sans-serif; margin: 0; }
        .gold-glow { box-shadow: 0 0 20px rgba(234, 179, 8, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        // ТВОЯ КОНФИГУРАЦИЯ
        const firebaseConfig = {
            apiKey: "AIzaSyAZxG500x9pmjg1sy6iJXMKrUMhZ2TFFCk",
            authDomain: "major-win.firebaseapp.com",
            projectId: "major-win",
            storageBucket: "major-win.firebasestorage.app",
            messagingSenderId: "253408264315",
            appId: "1:253408264315:web:1246e65a3c2ed70c4362de"
        };

        // Инициализация
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        const ITEMS_DB = [
            { id: 1, name: "AWP | Dragon Lore", price: 5000, color: "from-yellow-500" },
            { id: 2, name: "M4A4 | Howl", price: 2000, color: "from-red-600" },
            { id: 3, name: "AK-47 | Vulcan", price: 400, color: "from-blue-400" },
            { id: 4, name: "Glock-18 | Fade", price: 150, color: "from-purple-500" },
            { id: 5, name: "P250 | Sand Dune", price: 5, color: "from-gray-500" }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState({ balance: 0, inventory: [], nickname: "" });
            const [isSpinning, setIsSpinning] = useState(false);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                return auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        const docRef = db.collection("users").doc(u.uid);
                        const snap = await docRef.get();
                        if (snap.exists) {
                            setProfile(snap.data());
                        } else {
                            const initial = { balance: 1000, inventory: [], nickname: u.displayName || "Игрок" };
                            await docRef.set(initial);
                            setProfile(initial);
                        }
                    } else {
                        setUser(null);
                    }
                    setLoading(false);
                });
            }, []);

            const openCase = async () => {
                if (profile.balance < 100 || isSpinning) return;
                setIsSpinning(true);
                
                setTimeout(async () => {
                    const drop = { ...ITEMS_DB[Math.floor(Math.random() * ITEMS_DB.length)], instId: Date.now() };
                    const newProfile = {
                        ...profile,
                        balance: profile.balance - 100,
                        inventory: [...profile.inventory, drop]
                    };
                    await db.collection("users").doc(user.uid).update(newProfile);
                    setProfile(newProfile);
                    setIsSpinning(false);
                }, 1000);
            };

            const sellItem = async (instId, price) => {
                const newInv = profile.inventory.filter(i => i.instId !== instId);
                const newProfile = { ...profile, balance: profile.balance + price, inventory: newInv };
                await db.collection("users").doc(user.uid).update(newProfile);
                setProfile(newProfile);
            };

            if (loading) return <div className="h-screen flex items-center justify-center">Загрузка...</div>;

            if (!user) return (
                <div className="h-screen flex flex-col items-center justify-center space-y-4">
                    <h1 className="text-4xl font-black text-yellow-500 tracking-tighter uppercase text-center">Major Win <br/> Case Battle</h1>
                    <button onClick={() => auth.signInWithPopup(provider)} className="bg-white text-black px-8 py-3 rounded-full font-bold hover:bg-gray-200 transition">
                        Войти через Google
                    </button>
                </div>
            );

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-10">
                    <header className="flex justify-between items-center border-b border-gray-800 pb-6 mb-10">
                        <div>
                            <p className="text-sm text-gray-400">Привет, {profile.nickname}</p>
                            <p className="text-2xl font-black text-green-400 font-mono">{profile.balance.toFixed(2)} $</p>
                        </div>
                        <button onClick={() => auth.signOut()} className="text-xs text-gray-500 hover:text-red-400">ВЫЙТИ</button>
                    </header>

                    <div className="bg-[#161b22] p-10 rounded-3xl border border-gray-800 text-center gold-glow">
                        <motion.div animate={isSpinning ? { rotate: 360, scale: [1, 1.2, 1] } : {}} className="text-8xl mb-6 inline-block">🎁</motion.div>
                        <br/>
                        <button 
                            onClick={openCase}
                            disabled={isSpinning}
                            className="bg-yellow-500 text-black px-10 py-4 rounded-xl font-black uppercase tracking-widest hover:bg-yellow-400 transition disabled:opacity-50 shadow-xl shadow-yellow-500/10"
                        >
                            {isSpinning ? "Открываем..." : "Открыть за 100$"}
                        </button>
                    </div>

                    <h2 className="mt-16 mb-6 font-bold text-gray-500 uppercase tracking-widest">Инвентарь</h2>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                        {profile.inventory.slice().reverse().map(item => (
                            <div key={item.instId} className="bg-[#161b22] p-4 rounded-xl border border-gray-800 relative group">
                                <div className={`h-1 w-full bg-gradient-to-r ${item.color} to-transparent absolute top-0 left-0`} />
                                <p className="text-xs font-bold truncate">{item.name}</p>
                                <p className="text-green-500 text-sm font-bold mt-1">{item.price}$</p>
                                <button onClick={() => sellItem(item.instId, item.price)} className="mt-2 text-[10px] bg-gray-700 px-2 py-1 rounded hover:bg-red-900 transition w-full">ПРОДАТЬ</button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
