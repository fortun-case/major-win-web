<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Major Win | Case Battle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        body { background-color: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; }
        .item-card { transition: all 0.3s ease; border: 1px solid #30363d; }
        .item-card:hover { transform: translateY(-5px); border-color: #8b949e; }
        .gold-glow { box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = FramerMotion;

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ТВОЯ КОНФИГУРАЦИЯ
        const firebaseConfig = {
            apiKey: "AIzaSyAZxG500x9pmjg1sy6iJXMKrUMhZ2TFFCk",
            authDomain: "major-win.firebaseapp.com",
            projectId: "major-win",
            storageBucket: "major-win.firebasestorage.app",
            messagingSenderId: "253408264315",
            appId: "1:253408264315:web:1246e65a3c2ed70c4362de"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const ITEMS_DB = [
            { id: 1, name: "AWP | Dragon Lore", price: 5000, rarity: "Gold", color: "from-yellow-500" },
            { id: 2, name: "M4A4 | Howl", price: 2000, rarity: "Red", color: "from-red-600" },
            { id: 3, name: "AK-47 | Vulcan", price: 400, rarity: "Pink", color: "from-pink-500" },
            { id: 4, name: "USP-S | Cyrex", price: 50, rarity: "Purple", color: "from-purple-500" },
            { id: 5, name: "P250 | Sand Dune", price: 5, rarity: "Blue", color: "from-blue-500" }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState({ balance: 0, inventory: [], nickname: "" });
            const [isSpinning, setIsSpinning] = useState(false);
            const [editName, setEditName] = useState(false);

            useEffect(() => {
                return onAuthStateChanged(auth, async (u) => {
                    if (u) {
                        setUser(u);
                        const docRef = doc(db, "users", u.uid);
                        const snap = await getDoc(docRef);
                        if (snap.exists()) {
                            setProfile(snap.data());
                        } else {
                            const initial = { balance: 1000, inventory: [], nickname: u.displayName };
                            await setDoc(docRef, initial);
                            setProfile(initial);
                        }
                    } else { setUser(null); }
                });
            }, []);

            const updateDB = async (newData) => {
                const docRef = doc(db, "users", user.uid);
                await updateDoc(docRef, newData);
                setProfile(prev => ({ ...prev, ...newData }));
            };

            const openCase = () => {
                if (profile.balance < 100 || isSpinning) return;
                setIsSpinning(true);
                setTimeout(() => {
                    const drop = { ...ITEMS_DB[Math.floor(Math.random() * ITEMS_DB.length)], instId: Date.now() };
                    updateDB({
                        balance: profile.balance - 100,
                        inventory: [...profile.inventory, drop]
                    });
                    setIsSpinning(false);
                }, 1500);
            };

            const sellItem = (instId, price) => {
                const newInv = profile.inventory.filter(i => i.instId !== instId);
                updateDB({ balance: profile.balance + price, inventory: newInv });
            };

            const changeNick = (e) => {
                if (e.key === 'Enter') {
                    updateDB({ nickname: e.target.value });
                    setEditName(false);
                }
            };

            if (!user) return (
                <div className="h-screen flex items-center justify-center bg-[#0d1117]">
                    <button onClick={() => signInWithPopup(auth, provider)} className="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-lg font-bold transition">
                        Войти через Google
                    </button>
                </div>
            );

            return (
                <div className="max-w-5xl mx-auto p-4 md:p-8">
                    {/* Header */}
                    <header className="flex flex-col md:flex-row justify-between items-center gap-4 border-b border-gray-800 pb-6">
                        <div className="flex items-center gap-4">
                            <img src={user.photoURL} className="w-12 h-12 rounded-full border-2 border-blue-500" />
                            <div>
                                {editName ? (
                                    <input autoFocus onKeyDown={changeNick} className="bg-gray-800 border border-blue-500 px-2 rounded" defaultValue={profile.nickname} />
                                ) : (
                                    <h2 onClick={() => setEditName(true)} className="font-bold text-xl cursor-pointer hover:text-blue-400">
                                        {profile.nickname} ✎
                                    </h2>
                                )}
                                <p className="text-green-400 font-mono">{profile.balance.toFixed(2)} $</p>
                            </div>
                        </div>
                        <h1 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 uppercase">Major Win</h1>
                    </header>

                    {/* Case Section */}
                    <div className="mt-12 text-center p-12 bg-[#161b22] rounded-3xl border border-gray-800 gold-glow">
                        <motion.div animate={isSpinning ? { rotate: 360 } : {}} transition={{ duration: 0.5, repeat: isSpinning ? Infinity : 0 }} className="text-8xl mb-8 inline-block">📦</motion.div>
                        <br/>
                        <button onClick={openCase} disabled={isSpinning} className="bg-gradient-to-r from-yellow-500 to-orange-600 text-black px-12 py-4 rounded-xl font-black text-xl hover:scale-105 active:scale-95 transition disabled:opacity-50">
                            {isSpinning ? "УДАЧА БЛИЗКО..." : "ОТКРЫТЬ КЕЙС (100 $)"}
                        </button>
                    </div>

                    {/* Inventory */}
                    <section className="mt-16">
                        <h3 className="text-xl font-bold mb-6 text-gray-400 uppercase tracking-widest">Твой Инвентарь ({profile.inventory.length})</h3>
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4">
                            <AnimatePresence>
                                {profile.inventory.slice().reverse().map((item) => (
                                    <motion.div layout initial={{ scale: 0 }} animate={{ scale: 1 }} exit={{ scale: 0 }} key={item.instId} className="item-card bg-[#161b22] p-4 rounded-xl relative group overflow-hidden">
                                        <div className={`h-1 w-full bg-gradient-to-r ${item.color} to-transparent absolute top-0 left-0`} />
                                        <p className="font-bold text-sm h-10 overflow-hidden">{item.name}</p>
                                        <p className="text-green-500 font-bold mt-2">{item.price} $</p>
                                        <button onClick={() => sellItem(item.instId, item.price)} className="mt-3 w-full bg-gray-700 hover:bg-red-900 text-xs py-1 rounded transition">ПРОДАТЬ</button>
                                    </motion.div>
                                ))}
                            </AnimatePresence>
                        </div>
                    </section>

                    <footer className="mt-20 text-center text-gray-600 text-sm border-t border-gray-800 pt-8">
                        Major Win &copy; 2026. Только для развлечения.
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
