<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAJOR WIN | CASE BATTLE, UPGRADE & CONTRACTS</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #060709; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .bg-dark-card { background: #0f111a; border: 1px solid #1f222e; }
        .item-glow-Gold { border: 1px border #eab308; box-shadow: 0 0 15px rgba(234,179,8,0.2); }
        .item-glow-Red { border: 1px border #dc2626; box-shadow: 0 0 15px rgba(220,38,38,0.2); }
        .tab-active { color: #eab308; border-bottom: 2px solid #eab308; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .anim-pulse { animation: pulse 1.5s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAZxG500x9pmjg1sy6iJXMKrUMhZ2TFFCk",
            authDomain: "major-win.firebaseapp.com",
            projectId: "major-win",
            storageBucket: "major-win.firebasestorage.app",
            messagingSenderId: "253408264315",
            appId: "1:253408264315:web:1246e65a3c2ed70c4362de"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        const ITEMS_LIST = [
            { id: 1, name: "Karambit | Lore", price: 8500, rarity: "Gold" },
            { id: 2, name: "M4A4 | Howl", price: 4200, rarity: "Red" },
            { id: 3, name: "AK-47 | Fire Serpent", price: 1500, rarity: "Red" },
            { id: 4, name: "AWP | Oni Taiji", price: 750, rarity: "Pink" },
            { id: 5, name: "USP-S | Printstream", price: 180, rarity: "Pink" },
            { id: 6, name: "Glock | Neo-Noir", price: 45, rarity: "Purple" },
            { id: 7, name: "Desert Eagle | Code Red", price: 25, rarity: "Purple" },
            { id: 8, name: "P250 | Sand Dune", price: 3, rarity: "Blue" }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState({ balance: 0, inventory: [], nickname: "" });
            const [tab, setTab] = useState('cases'); 
            const [isProcessing, setIsProcessing] = useState(false);

            // Состояния игр
            const [upgSource, setUpgSource] = useState(null);
            const [upgTarget, setUpgTarget] = useState(ITEMS_LIST[0]);
            const [contractItems, setContractItems] = useState([]);

            useEffect(() => {
                return auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        const docRef = db.collection("users").doc(u.uid);
                        const snap = await docRef.get();
                        if (snap.exists) setProfile(snap.data());
                        else {
                            const init = { balance: 5000, inventory: [], nickname: u.displayName };
                            await docRef.set(init);
                            setProfile(init);
                        }
                    } else setUser(null);
                });
            }, []);

            const sync = async (data) => {
                await db.collection("users").doc(user.uid).update(data);
                setProfile(prev => ({ ...prev, ...data }));
            };

            const sellItem = (instId, price) => {
                const newInv = profile.inventory.filter(i => i.instId !== instId);
                sync({ balance: profile.balance + price, inventory: newInv });
                if (upgSource?.instId === instId) setUpgSource(null);
                setContractItems(prev => prev.filter(i => i.instId !== instId));
            };

            const openCase = () => {
                if (profile.balance < 250 || isProcessing) return;
                setIsProcessing(true);
                setTimeout(() => {
                    const drop = { ...ITEMS_LIST[Math.floor(Math.random() * ITEMS_LIST.length)], instId: Date.now() };
                    sync({ balance: profile.balance - 250, inventory: [...profile.inventory, drop] });
                    setIsProcessing(false);
                }, 800);
            };

            const handleUpgrade = () => {
                if (!upgSource || isProcessing) return;
                setIsProcessing(true);
                const chance = Math.min((upgSource.price / upgTarget.price) * 100, 95);
                const win = Math.random() * 100 <= chance;
                setTimeout(() => {
                    let newInv = profile.inventory.filter(i => i.instId !== upgSource.instId);
                    if (win) newInv.push({ ...upgTarget, instId: Date.now() });
                    sync({ inventory: newInv });
                    setUpgSource(null);
                    setIsProcessing(false);
                    alert(win ? "🔥 УСПЕХ!" : "💀 ПРЕДМЕТ СГОРЕЛ");
                }, 1200);
            };

            const handleContract = () => {
                if (contractItems.length < 3 || isProcessing) return;
                setIsProcessing(true);
                setTimeout(() => {
                    const avgPrice = contractItems.reduce((sum, item) => sum + item.price, 0) / 3;
                    const targetPrice = avgPrice * 1.5;
                    const possibleDrops = ITEMS_LIST.filter(i => i.price >= targetPrice) || [ITEMS_LIST[0]];
                    const drop = { ...possibleDrops[Math.floor(Math.random() * possibleDrops.length)], instId: Date.now() };
                    
                    const contractIds = contractItems.map(i => i.instId);
                    const newInv = profile.inventory.filter(i => !contractIds.includes(i.instId));
                    newInv.push(drop);

                    sync({ inventory: newInv });
                    setContractItems([]);
                    setIsProcessing(false);
                    alert("Контракт выполнен! Проверь инвентарь.");
                }, 1500);
            };

            if (!user) return <div className="h-screen flex items-center justify-center"><button onClick={() => auth.signInWithPopup(provider)} className="bg-yellow-500 text-black font-bold px-10 py-4 rounded-full uppercase tracking-tighter shadow-lg shadow-yellow-500/20">Войти через Google</button></div>;

            return (
                <div className="max-w-6xl mx-auto p-4 lg:p-10">
                    <header className="flex flex-col md:flex-row justify-between items-center bg-dark-card p-6 rounded-3xl border border-gray-800 mb-8">
                        <div className="flex items-center gap-4 mb-4 md:mb-0">
                            <div className="w-12 h-12 bg-yellow-500 rounded-full flex items-center justify-center text-black font-black text-xl">M</div>
                            <div>
                                <h1 className="text-xl font-black text-yellow-500 uppercase">Major Win</h1>
                                <p className="text-xs text-gray-500">{profile.nickname}</p>
                            </div>
                        </div>
                        <div className="text-center md:text-right">
                            <p className="text-3xl font-black text-green-400 font-mono tracking-tighter">{profile.balance.toFixed(2)} $</p>
                            <button onClick={() => auth.signOut()} className="text-[10px] text-gray-600 hover:text-red-500 uppercase font-bold transition">Выйти из профиля</button>
                        </div>
                    </header>

                    <nav className="flex justify-center gap-10 mb-12 uppercase text-xs font-black tracking-[0.2em]">
                        {['cases', 'upgrade', 'contracts'].map(t => (
                            <button key={t} onClick={() => setTab(t)} className={`pb-2 transition-all ${tab === t ? 'tab-active' : 'text-gray-600 hover:text-white'}`}>
                                {t === 'cases' ? 'Кейсы' : t === 'upgrade' ? 'Апгрейд' : 'Контракты'}
                            </button>
                        ))}
                    </nav>

                    {/* CASES */}
                    {tab === 'cases' && (
                        <div className="flex flex-col items-center py-20 bg-dark-card rounded-[3rem] border-2 border-dashed border-gray-800 shadow-2xl">
                            <div className={`text-9xl mb-12 drop-shadow-2xl ${isProcessing ? 'anim-pulse scale-110' : ''}`}>📦</div>
                            <button onClick={openCase} disabled={isProcessing} className="bg-gradient-to-r from-yellow-400 to-yellow-600 text-black px-16 py-5 rounded-2xl font-black text-2xl uppercase hover:scale-105 transition shadow-xl shadow-yellow-500/20">
                                {isProcessing ? 'Открываем...' : 'Открыть (250$)'}
                            </button>
                        </div>
                    )}

                    {/* UPGRADE */}
                    {tab === 'upgrade' && (
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 bg-dark-card p-8 rounded-3xl items-center">
                            <div className="h-64 border-2 border-dashed border-gray-800 rounded-2xl flex flex-col items-center justify-center p-4">
                                <span className="text-[10px] text-gray-600 mb-4 uppercase">Твой предмет</span>
                                {upgSource ? (
                                    <div className={`w-full p-4 rounded-xl bg-black text-center item-glow-${upgSource.rarity}`}>
                                        <p className="font-bold text-sm">{upgSource.name}</p>
                                        <p className="text-green-400 font-bold mt-2">{upgSource.price}$</p>
                                    </div>
                                ) : <p className="text-gray-700 text-sm">Выбери из инвентаря</p>}
                            </div>
                            <div className="text-center">
                                <div className="text-5xl font-black text-yellow-500 mb-6">{upgSource ? ((upgSource.price / upgTarget.price)*100).toFixed(1) : '0'}%</div>
                                <button onClick={handleUpgrade} disabled={!upgSource || isProcessing} className="w-full bg-yellow-500 text-black py-4 rounded-xl font-black uppercase hover:bg-yellow-400 transition">Апгрейд</button>
                            </div>
                            <div className="h-64 bg-black border border-gray-800 rounded-2xl flex flex-col items-center justify-center p-4">
                                <span className="text-[10px] text-gray-600 mb-2 uppercase">Цель</span>
                                <select onChange={(e) => setUpgTarget(ITEMS_LIST.find(i => i.id == e.target.value))} className="bg-transparent text-white text-xs mb-4 outline-none border-b border-gray-700">
                                    {ITEMS_LIST.filter(i => i.price > (upgSource?.price || 0)).map(i => <option key={i.id} value={i.id}>{i.name} ({i.price}$)</option>)}
                                </select>
                                <div className={`w-full p-4 rounded-xl bg-[#0d1117] text-center item-glow-${upgTarget.rarity}`}>
                                    <p className="font-bold text-sm">{upgTarget.name}</p>
                                    <p className="text-green-400 font-bold mt-2">{upgTarget.price}$</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* CONTRACTS */}
                    {tab === 'contracts' && (
                        <div className="bg-dark-card p-10 rounded-3xl text-center">
                            <h2 className="text-xl font-black text-yellow-500 mb-8 uppercase italic tracking-tighter">Сборочный Цех (3 предмета)</h2>
                            <div className="flex flex-wrap justify-center gap-4 mb-10">
                                {[0,1,2].map(i => (
                                    <div key={i} className="w-32 h-40 border-2 border-dashed border-gray-800 rounded-2xl flex items-center justify-center overflow-hidden">
                                        {contractItems[i] ? (
                                            <div className="p-2 text-[10px] font-bold text-center">
                                                <p className="mb-2">{contractItems[i].name}</p>
                                                <button onClick={() => setContractItems(prev => prev.filter((_, idx) => idx !== i))} className="text-red-500">Убрать</button>
                                            </div>
                                        ) : <span className="text-gray-800 text-4xl font-black">?</span>}
                                    </div>
                                ))}
                            </div>
                            <button onClick={handleContract} disabled={contractItems.length < 3 || isProcessing} className="bg-white text-black px-12 py-4 rounded-xl font-bold uppercase disabled:opacity-20 transition">Подписать контракт</button>
                        </div>
                    )}

                    {/* INVENTORY */}
                    <div className="mt-16">
                        <div className="flex justify-between items-center mb-8 border-l-4 border-yellow-500 pl-4">
                            <h3 className="font-black uppercase text-sm tracking-widest text-gray-400">Твой Арсенал</h3>
                            <span className="text-xs font-mono text-gray-600">{profile.inventory.length} предметов</span>
                        </div>
                        <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 lg:grid-cols-6 gap-3">
                            {profile.inventory.slice().reverse().map((item) => (
                                <div key={item.instId} className={`bg-dark-card p-4 rounded-2xl relative transition-all hover:-translate-y-1 item-glow-${item.rarity}`}>
                                    <p className="text-[10px] font-bold h-8 overflow-hidden leading-tight text-gray-200">{item.name}</p>
                                    <p className="text-green-500 font-black mt-2 text-sm">{item.price}$</p>
                                    <div className="mt-3 grid grid-cols-1 gap-1">
                                        <button onClick={() => sellItem(item.instId, item.price)} className="text-[9px] bg-red-900/10 text-red-500 py-1 rounded-lg hover:bg-red-500 hover:text-white transition uppercase font-bold">Продать</button>
                                        {tab === 'upgrade' && <button onClick={() => setUpgSource(item)} className="text-[9px] bg-blue-900/10 text-blue-500 py-1 rounded-lg hover:bg-blue-500 hover:text-white transition uppercase font-bold">В апгрейд</button>}
                                        {tab === 'contracts' && !contractItems.find(ci => ci.instId === item.instId) && contractItems.length < 3 && (
                                            <button onClick={() => setContractItems(prev => [...prev, item])} className="text-[9px] bg-green-900/10 text-green-500 py-1 rounded-lg hover:bg-green-500 hover:text-white transition uppercase font-bold">В контракт</button>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
