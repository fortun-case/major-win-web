<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Major Win — Симулятор Кейсов</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="header">
        <h1>MAJOR <span class="gold">WIN</span></h1>
        <div id="user-info">
            <button id="login-btn">Войти через Google</button>
            <span id="balance-display" style="display:none;">Баланс: <span id="balance-amount">0</span>$</span>
        </div>
    </div>

    <div class="main-container">
        <div class="case-card">
            <div class="item-display">
                <div id="item-rarity-light"></div>
                <img src="https://via.placeholder.com/200x150/111/fff?text=Major+Win" id="item-img" alt="Item">
            </div>
            <h2 id="item-name">Испытай удачу!</h2>
            <p id="item-rarity-text">Нажми на кнопку ниже</p>
            <button id="open-btn" class="main-button">Открыть за 50$</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
