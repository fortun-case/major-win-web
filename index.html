<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Major Win — Симулятор Кейсов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap');

        :root {
            --bg-deep: #080a0c;
            --accent-gold: #ffb400;
            --rarity-rare: #4b69ff;
            --rarity-mythical: #8847ff;
            --rarity-legendary: #d32ce6;
            --rarity-ancient: #eb4b4b;
            --rarity-gold: #ffb400;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-deep);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(18, 21, 26, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
        }

        .premium-btn {
            background: linear-gradient(135deg, #ffb400 0%, #ff8c00 100%);
            color: #000;
            font-weight: 800;
            transition: all 0.2s ease;
        }

        .premium-btn:hover:not(:disabled) {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        /* Индикатор редкости */
        .rarity-line { height: 4px; width: 100%; position: absolute; bottom: 0; left: 0; border-radius: 0 0 16px 16px; }
        .rare { background: var(--rarity-rare); box-shadow: 0 0 15px var(--rarity-rare); }
        .mythical { background: var(--rarity-mythical); box-shadow: 0 0 15px var(--rarity-mythical); }
        .legendary { background: var(--rarity-legendary); box-shadow: 0 0 15px var(--rarity-legendary); }
        .ancient { background: var(--rarity-ancient); box-shadow: 0 0 15px var(--rarity-ancient); }
        .gold { background: var(--rarity-gold); box-shadow: 0 0 15px var(--rarity-gold); }

        .roulette-container {
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
            position: relative;
        }

        .roulette-marker {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent-gold);
            z-index: 50;
            transform: translateX(-50%);
            box-shadow: 0 0 15px var(--accent-gold);
        }

        .carousel {
            display: flex;
            transition: transform 7s cubic-bezier(0.1, 0, 0.1, 1);
            will-change: transform;
        }

        .item-card {
            min-width: 160px;
            height: 180px;
            margin: 0 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
        }

        .item-card img {
            width: 120px;
            height: 90px;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        @keyframes winPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .win-animate { animation: winPulse 2s infinite ease-in-out; }
    </style>
</head>
<body>

    <!-- Навигация -->
    <header class="h-20 border-b border-white/5 flex items-center bg-black/50 sticky top-0 z-[100]">
        <div class="container mx-auto px-6 flex justify-between items-center">
            <div class="text-2xl font-black italic tracking-tighter cursor-pointer" onclick="location.reload()">
                MAJOR<span class="text-[#ffb400]">WIN</span>
            </div>
            
            <div class="flex items-center gap-6">
                <div id="balance-display" class="hidden flex flex-col items-end">
                    <span class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Баланс</span>
                    <span class="text-[#ffb400] font-black text-xl"><span id="user-bal">0</span> ₽</span>
                </div>
                <div id="auth-btns">
                    <button onclick="openModal('modal-auth')" class="premium-btn px-6 py-2 rounded-xl text-sm">Войти</button>
                </div>
                <div id="user-btns" class="hidden">
                    <button onclick="switchTab('profile')" class="bg-white/5 hover:bg-white/10 p-3 rounded-xl transition">
                        <i class="fas fa-user"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-10">
        <!-- Главная: Кейсы -->
        <section id="view-home">
            <h1 class="text-3xl font-black italic uppercase mb-8">Мистери Кейсы</h1>
            <div id="cases-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
        </section>

        <!-- Профиль -->
        <section id="view-profile" class="hidden">
            <div class="flex justify-between items-end mb-8">
                <h1 class="text-3xl font-black italic uppercase">Ваш Инвентарь</h1>
                <button onclick="switchTab('home')" class="text-gray-500 hover:text-white transition text-sm font-bold uppercase">Назад в магазин</button>
            </div>
            <div id="inventory-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </section>
    </main>

    <!-- Модалка Кейса -->
    <div id="modal-preview" class="fixed inset-0 z-[200] bg-black/90 hidden flex items-center justify-center p-4">
        <div class="glass-card max-w-4xl w-full p-8 relative">
            <button onclick="closeModal('modal-preview')" class="absolute top-6 right-6 text-gray-500 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            <div class="text-center mb-8">
                <h2 id="p-name" class="text-3xl font-black italic uppercase">Кейс</h2>
                <p id="p-price" class="text-[#ffb400] font-black text-xl mt-2">0 ₽</p>
            </div>
            <div id="p-items" class="grid grid-cols-3 sm:grid-cols-5 gap-4 mb-10 max-h-[40vh] overflow-y-auto pr-2"></div>
            <div class="flex justify-center">
                <button id="p-open-btn" class="premium-btn px-12 py-4 rounded-2xl text-lg shadow-lg">Открыть кейс</button>
            </div>
        </div>
    </div>

    <!-- Модалка Рулетки -->
    <div id="modal-roll" class="fixed inset-0 z-[300] bg-black/95 hidden flex items-center justify-center">
        <div class="w-full max-w-5xl px-4">
            <div id="roll-ui">
                <h2 class="text-center text-4xl font-black italic mb-12 animate-pulse">ОТКРЫВАЕМ...</h2>
                <div class="roulette-container h-48 bg-white/5 rounded-2xl overflow-hidden glass-card">
                    <div class="roulette-marker"></div>
                    <div id="carousel" class="carousel h-full items-center"></div>
                </div>
            </div>

            <div id="result-ui" class="hidden flex flex-col items-center">
                <div id="result-card" class="glass-card p-10 flex flex-col items-center win-animate relative overflow-hidden">
                    <div id="result-rarity" class="rarity-line"></div>
                    <img id="result-img" src="" class="w-64 h-48 object-contain mb-6">
                    <h3 id="result-name" class="text-2xl font-black text-center mb-2">Название скина</h3>
                    <p id="result-price" class="text-[#ffb400] font-black text-xl mb-8">0 ₽</p>
                    <div class="flex gap-4 w-full">
                        <button onclick="sellWin()" class="flex-1 py-4 bg-white/5 hover:bg-white/10 rounded-xl font-bold uppercase text-xs transition">Продать</button>
                        <button onclick="keepWin()" class="flex-1 py-4 premium-btn rounded-xl font-bold uppercase text-xs transition">В инвентарь</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка Авторизации -->
    <div id="modal-auth" class="fixed inset-0 z-[400] bg-black/80 hidden flex items-center justify-center p-4">
        <div class="glass-card max-w-md w-full p-10">
            <h2 class="text-center text-2xl font-black mb-8 italic uppercase">Вход / Регистрация</h2>
            <div class="space-y-4">
                <input id="auth-email" type="email" placeholder="Email" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl outline-none focus:border-[#ffb400]">
                <input id="auth-pass" type="password" placeholder="Пароль" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl outline-none focus:border-[#ffb400]">
                <button onclick="handleAuth()" class="premium-btn w-full py-4 rounded-xl">Продолжить</button>
                <p class="text-center text-xs text-gray-500 px-4">Используйте любые данные, это тестовый симулятор.</p>
                <button onclick="closeModal('modal-auth')" class="w-full text-center text-gray-600 text-xs uppercase font-bold mt-4">Отмена</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // КОНФИГУРАЦИЯ ИЗ ВАШЕГО СКРИНШОТА
        const firebaseConfig = {
            apiKey: "AIzaSyA-8Htang_pmMugvnekBa2s4akqHD7fGYU", // Исправленный ключ
            authDomain: "major-win-b2255.firebaseapp.com",
            projectId: "major-win-b2255",
            databaseURL: "https://major-win-b2255-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ИСПОЛЬЗУЕМ СТАБИЛЬНЫЕ ИЗОБРАЖЕНИЯ (Cloudinary/Imgur или игровые превью)
        const ITEMS = [
            { id: 1, name: "Glock-18 | High Beam", price: 12, rarity: 'rare', img: "https://files.opskins.media/file/vgo-img/item/glock-18-high-beam-factory-new.png" },
            { id: 2, name: "USP-S | Cyrex", price: 250, rarity: 'mythical', img: "https://files.opskins.media/file/vgo-img/item/usp-s-cyrex-factory-new.png" },
            { id: 3, name: "M4A4 | Desolate Space", price: 850, rarity: 'legendary', img: "https://files.opskins.media/file/vgo-img/item/m4a4-desolate-space-factory-new.png" },
            { id: 4, name: "AK-47 | Neon Revolution", price: 2100, rarity: 'ancient', img: "https://files.opskins.media/file/vgo-img/item/ak-47-neon-revolution-factory-new.png" },
            { id: 5, name: "AWP | Asiimov", price: 12000, rarity: 'ancient', img: "https://files.opskins.media/file/vgo-img/item/awp-asiimov-field-tested.png" },
            { id: 6, name: "Butterfly Knife | Fade", price: 185000, rarity: 'gold', img: "https://files.opskins.media/file/vgo-img/item/butterfly-knife-fade-factory-new.png" },
            { id: 7, name: "M9 Bayonet | Doppler", price: 95000, rarity: 'gold', img: "https://files.opskins.media/file/vgo-img/item/m9-bayonet-doppler-factory-new.png" }
        ];

        const CASES = [
            { id: 'c1', name: 'Стартовый набор', price: 50, items: [1, 1, 1, 2] },
            { id: 'c2', name: 'Оружейный кейс', price: 500, items: [1, 2, 2, 3] },
            { id: 'c3', name: 'Секретное оружие', price: 2500, items: [3, 3, 4, 5] },
            { id: 'c4', name: 'Кейс с Ножами', price: 45000, items: [5, 6, 7] }
        ];

        let user = null;
        let userData = { balance: 0, inventory: [] };
        let currentWinningItem = null;

        // AUTH
        window.handleAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || pass.length < 6) return alert("Введите корректные данные (пароль от 6 символов)");
            
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch(e) {
                try {
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    await set(ref(db, `users/${cred.user.uid}`), { balance: 10000, inventory: [] });
                } catch(err) { alert("Ошибка: " + err.message); }
            }
            closeModal('modal-auth');
        };

        onAuthStateChanged(auth, u => {
            if(u) {
                user = u;
                document.getElementById('auth-btns').classList.add('hidden');
                document.getElementById('balance-display').classList.remove('hidden');
                document.getElementById('user-btns').classList.remove('hidden');
                onValue(ref(db, `users/${u.uid}`), snap => {
                    if(snap.exists()) {
                        userData = snap.val();
                        if(!userData.inventory) userData.inventory = [];
                        updateUI();
                    }
                });
            } else {
                user = null;
                document.getElementById('auth-btns').classList.remove('hidden');
                document.getElementById('balance-display').classList.add('hidden');
                document.getElementById('user-btns').classList.add('hidden');
                switchTab('home');
            }
        });

        function updateUI() {
            document.getElementById('user-bal').innerText = Math.floor(userData.balance).toLocaleString();
            const invGrid = document.getElementById('inventory-grid');
            invGrid.innerHTML = userData.inventory.map(item => `
                <div class="glass-card p-4 relative group animate-fade">
                    <img src="${item.img}" class="w-full h-24 object-contain">
                    <div class="mt-2 text-[10px] font-bold text-gray-400 uppercase truncate">${item.name}</div>
                    <div class="text-[#ffb400] font-black text-xs">${item.price.toLocaleString()} ₽</div>
                    <div class="rarity-line ${item.rarity}"></div>
                </div>
            `).reverse().join('');
        }

        // КЕЙСЫ
        const grid = document.getElementById('cases-grid');
        grid.innerHTML = CASES.map(c => `
            <div onclick="openPreview('${c.id}')" class="glass-card p-6 flex flex-col items-center cursor-pointer hover:scale-105 transition border border-white/5 hover:border-[#ffb400]/30">
                <img src="https://files.opskins.media/file/vgo-img/item/clutch-case.png" class="w-32 h-32 object-contain mb-4">
                <div class="text-sm font-bold uppercase text-gray-500">${c.name}</div>
                <div class="text-[#ffb400] font-black text-xl mt-1">${c.price.toLocaleString()} ₽</div>
            </div>
        `).join('');

        window.openPreview = (id) => {
            const c = CASES.find(x => x.id === id);
            document.getElementById('p-name').innerText = c.name;
            document.getElementById('p-price').innerText = c.price.toLocaleString() + " ₽";
            document.getElementById('p-items').innerHTML = c.items.map(itemId => {
                const it = ITEMS.find(i => i.id === itemId);
                return `
                    <div class="bg-white/5 p-3 rounded-xl flex flex-col items-center">
                        <img src="${it.img}" class="w-16 h-12 object-contain">
                        <div class="text-[8px] font-bold mt-2 truncate w-full text-center">${it.name}</div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('p-open-btn').onclick = () => startRoll(c);
            openModal('modal-preview');
        };

        // РУЛЕТКА
        function startRoll(caseObj) {
            if(!user) return openModal('modal-auth');
            if(userData.balance < caseObj.price) return alert("Недостаточно баланса!");

            closeModal('modal-preview');
            document.getElementById('modal-roll').classList.remove('hidden');
            document.getElementById('roll-ui').classList.remove('hidden');
            document.getElementById('result-ui').classList.add('hidden');

            const carousel = document.getElementById('carousel');
            carousel.style.transition = 'none';
            carousel.style.transform = 'translateX(0)';

            // Генерация ленты
            let tape = [];
            for(let i=0; i<80; i++) tape.push(ITEMS[Math.floor(Math.random() * ITEMS.length)]);
            
            // Финальный предмет (шанс из кейса)
            const possible = caseObj.items.map(id => ITEMS.find(it => it.id === id));
            currentWinningItem = possible[Math.floor(Math.random() * possible.length)];
            tape[70] = currentWinningItem;

            carousel.innerHTML = tape.map(item => `
                <div class="item-card">
                    <img src="${item.img}">
                    <div class="rarity-line ${item.rarity}" style="position:static; height:3px; margin-top:10px; width:60px; border-radius:5px"></div>
                </div>
            `).join('');

            // Списание баланса
            userData.balance -= caseObj.price;
            update(ref(db, `users/${user.uid}`), { balance: userData.balance });

            setTimeout(() => {
                const itemWidth = 170; // 160 + margin 10
                const center = document.querySelector('.roulette-container').offsetWidth / 2;
                const targetPos = (70 * itemWidth) - center + (itemWidth / 2);
                
                carousel.style.transition = 'transform 7s cubic-bezier(0.1, 0, 0.1, 1)';
                carousel.style.transform = `translateX(-${targetPos}px)`;
            }, 50);

            setTimeout(showResult, 7200);
        }

        function showResult() {
            document.getElementById('roll-ui').classList.add('hidden');
            document.getElementById('result-ui').classList.remove('hidden');
            document.getElementById('result-img').src = currentWinningItem.img;
            document.getElementById('result-name').innerText = currentWinningItem.name;
            document.getElementById('result-price').innerText = currentWinningItem.price.toLocaleString() + " ₽";
            document.getElementById('result-rarity').className = `rarity-line ${currentWinningItem.rarity}`;
        }

        window.keepWin = () => {
            userData.inventory.push({...currentWinningItem, uid: Date.now()});
            update(ref(db, `users/${user.uid}`), { inventory: userData.inventory });
            closeModal('modal-roll');
        };

        window.sellWin = () => {
            userData.balance += currentWinningItem.price;
            update(ref(db, `users/${user.uid}`), { balance: userData.balance });
            closeModal('modal-roll');
        };

        // UI Helpers
        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
        window.switchTab = (tab) => {
            document.getElementById('view-home').classList.toggle('hidden', tab !== 'home');
            document.getElementById('view-profile').classList.toggle('hidden', tab !== 'profile');
        };

    </script>
</body>
</html>
